    <!-- //header -->
    <!-- main -->
    <main>
      <section class="sc-contact">
        <div class="inner">
          <h2 class="sc-title">Contact</h2>
          <div class="map">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m5!3m3!1m2!1s0x3565fab7a9920c6f%3A0xd50c3ac1a566debe!2z64yA6rWs6rSR7Jet7IucIOuLrOyEnOq1rCDshLHshJzqs7Xri6jroZwgMTk0LTEwIDLsuLU!5e0!3m2!1sko!2skr!4v1782742216211!5m2!1sko!2skr"
              width="100%"
              height="450"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="strict-origin-when-cross-origin"></iframe>
          </div>
          <ul class="info">
            <li class="company">egapetkorea</li>
            <li class="address">대구광역시 달서구 성서공단로 194-10 2층</li>
            <li class="number">053-593-3322</li>
            <li class="email">egapetkor@naver.com</li>
          </ul>
          <h3 class="sub-title">YOU CAN USE THE FORM BELOW TO CONTACT US.</h3>
          <form class="form-contact">
            <div class="input-group">
              <div class="input-item">
                <label for="name">Company/organization name</label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Company/organization name" />
              </div>
              <div class="input-item">
                <label for="counrty">Counrty</label>
                <input
                  type="text"
                  id="counrty"
                  name="counrty"
                  placeholder="Counrty" />
              </div>
              <div class="input-item">
                <label for="number">Phone number</label>
                <input
                  type="text"
                  id="number"
                  name="number"
                  placeholder="Phone number" />
              </div>
              <div class="input-item">
                <label for="email">E-Mail</label>
                <input
                  type="text"
                  id="email"
                  name="email"
                  placeholder="E-Mail" />
              </div>
            </div>
            <div class="input-group">
              <div class="input-item">
                <label for="message">Message</label>
                <textarea
                  type="text"
                  id="message"
                  name="message"
                  placeholder="Message"></textarea>
              </div>
              <button class="btn-send">Send</button>
            </div>
          </form>
        </div>
      </section>
    </main>
    <!-- //main -->
    <!-- footer -->
    <footer class="footer">
